name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run Bandit security linter
      run: |
        uv run bandit -r src/ -f json -o bandit-report.json || true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v5
      with:
        name: bandit-report
        path: bandit-report.json

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: temp_zola/package-lock.json

    - name: Install dependencies
      working-directory: temp_zola
      run: npm ci

    - name: Type check
      working-directory: temp_zola
      run: npm run type-check

    - name: Lint
      working-directory: temp_zola
      run: npm run lint

    - name: Build
      working-directory: temp_zola
      run: npm run build